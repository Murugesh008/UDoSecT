<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OSINT Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:        #080b0f;
    --surface:   #0d1117;
    --border:    #1c2a3a;
    --accent:    #00d4ff;
    --accent2:   #00ff9d;
    --danger:    #ff3b5c;
    --warn:      #ffb800;
    --text:      #c9d8e8;
    --muted:     #4a6275;
    --low:       #00ff9d;
    --medium:    #ffb800;
    --high:      #ff3b5c;
    --critical:  #bf00ff;
    --info:      #00d4ff;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 960px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 48px;
    animation: fadeDown 0.6s ease both;
  }

  .logo {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 6px 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    position: relative;
    overflow: hidden;
  }

  .logo::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(0,212,255,0.15), transparent);
    animation: shimmer 3s infinite;
  }

  h1 {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #fff;
  }

  h1 span { color: var(--accent); }

  .tagline {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 2px;
    margin-top: 4px;
  }

  /* ── Input ── */
  .input-row {
    display: flex;
    gap: 0;
    margin-bottom: 40px;
    animation: fadeUp 0.6s 0.1s ease both;
  }

  .input-row input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-right: none;
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
    font-size: 16px;
    padding: 14px 20px;
    outline: none;
    transition: border-color 0.2s;
    letter-spacing: 1px;
  }

  .input-row input::placeholder { color: var(--muted); }

  .input-row input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent) inset, 0 0 20px rgba(0,212,255,0.08);
  }

  .input-row button {
    background: var(--accent);
    color: #000;
    border: none;
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 14px 32px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    white-space: nowrap;
  }

  .input-row button:hover { background: #33ddff; }
  .input-row button:active { transform: scale(0.98); }
  .input-row button:disabled { background: var(--muted); cursor: not-allowed; }

  /* ── Progress log ── */
  #log {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 20px;
    margin-bottom: 32px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    line-height: 2;
  }

  .log-line { color: var(--muted); }
  .log-line.done { color: var(--accent2); }
  .log-line.active { color: var(--accent); }
  .log-line.active::before { content: '▶ '; }
  .log-line.done::before { content: '✓ '; }

  /* ── Results ── */
  #results { display: none; animation: fadeUp 0.5s ease both; }

  /* Risk banner */
  .risk-banner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 28px;
    border: 1px solid var(--border);
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }

  .risk-banner::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    background: var(--risk-color, var(--accent));
  }

  .risk-left { display: flex; flex-direction: column; gap: 6px; }

  .risk-domain {
    font-family: 'Share Tech Mono', monospace;
    font-size: 20px;
    color: #fff;
    letter-spacing: 1px;
  }

  .risk-summary {
    font-size: 14px;
    color: var(--muted);
    max-width: 580px;
    line-height: 1.6;
  }

  .risk-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }

  .risk-badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    font-weight: bold;
    letter-spacing: 3px;
    padding: 6px 16px;
    border: 1px solid var(--risk-color, var(--accent));
    color: var(--risk-color, var(--accent));
    text-transform: uppercase;
  }

  .risk-score {
    font-size: 48px;
    font-weight: 700;
    color: var(--risk-color, var(--accent));
    line-height: 1;
    font-family: 'Share Tech Mono', monospace;
  }

  .risk-score span { font-size: 16px; color: var(--muted); }

  /* ── Score bar ── */
  .score-bar-wrap {
    height: 4px;
    background: var(--border);
    margin-bottom: 32px;
    overflow: hidden;
  }

  .score-bar-fill {
    height: 100%;
    background: var(--risk-color, var(--accent));
    width: 0%;
    transition: width 1s cubic-bezier(0.4,0,0.2,1);
    box-shadow: 0 0 12px var(--risk-color, var(--accent));
  }

  /* ── Section ── */
  .section { margin-bottom: 24px; }

  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
    transition: border-color 0.2s;
  }

  .section-header:hover { border-color: var(--accent); }

  .section-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    flex: 1;
  }

  .section-toggle {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    transition: transform 0.2s;
  }

  .section-body {
    border: 1px solid var(--border);
    border-top: none;
    padding: 20px;
    display: none;
  }

  .section-body.open { display: block; }

  /* ── Findings ── */
  .finding {
    display: grid;
    grid-template-columns: 80px 160px 1fr;
    gap: 12px;
    align-items: start;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }

  .finding:last-child { border-bottom: none; }

  .sev-badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    padding: 3px 8px;
    text-align: center;
    font-weight: bold;
  }

  .sev-INFO     { color: var(--info);   border: 1px solid var(--info);   }
  .sev-LOW      { color: var(--low);    border: 1px solid var(--low);    }
  .sev-MEDIUM   { color: var(--medium); border: 1px solid var(--medium); }
  .sev-HIGH     { color: var(--high);   border: 1px solid var(--high);   }

  .finding-cat  { font-weight: 600; font-size: 14px; color: #fff; padding-top: 2px; }
  .finding-detail { font-size: 14px; color: var(--text); line-height: 1.5; }

  /* ── Recommendations ── */
  .rec {
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    color: var(--text);
    line-height: 1.6;
    display: flex;
    gap: 12px;
  }

  .rec:last-child { border-bottom: none; }
  .rec::before { content: '→'; color: var(--accent2); font-family: monospace; flex-shrink: 0; }

  /* ── Raw JSON ── */
  pre {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--accent2);
    white-space: pre-wrap;
    word-break: break-all;
    line-height: 1.7;
    max-height: 400px;
    overflow-y: auto;
  }

  /* ── Error ── */
  .error-box {
    border: 1px solid var(--danger);
    padding: 16px 20px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--danger);
    margin-bottom: 24px;
  }

  /* ── Animations ── */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes shimmer {
    0%   { left: -100%; }
    100% { left: 200%; }
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0; }
  }

  .cursor {
    display: inline-block;
    width: 8px; height: 14px;
    background: var(--accent);
    animation: blink 1s infinite;
    vertical-align: middle;
    margin-left: 4px;
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div>
      <div class="logo">OSINT // v1.0</div>
    </div>
    <div>
      <h1>THREAT <span>INTEL</span></h1>
      <div class="tagline">// AI-POWERED OPEN SOURCE INTELLIGENCE</div>
    </div>
  </header>

  <div class="input-row">
    <input type="text" id="targetInput" placeholder="enter domain or ip address..." autocomplete="off" spellcheck="false"/>
    <button id="scanBtn" onclick="runScan()">SCAN ▶</button>
  </div>

  <!-- Progress log shown while scanning -->
  <div id="log">
    <div class="log-line" id="log-whois">WHOIS lookup</div>
    <div class="log-line" id="log-dns">DNS enumeration</div>
    <div class="log-line" id="log-ports">Port scan</div>
    <div class="log-line" id="log-geo">Geolocation</div>
    <div class="log-line" id="log-ssl">SSL analysis</div>
    <div class="log-line" id="log-llm">LLM threat analysis <span class="cursor"></span></div>
  </div>

  <div id="results"></div>

</div>

<script>
// Map risk level to CSS variable color
const riskColors = {
  LOW:      'var(--low)',
  MEDIUM:   'var(--medium)',
  HIGH:     'var(--high)',
  CRITICAL: 'var(--critical)',
};

// Steps shown in the progress log — matches backend module order
const logSteps = ['whois', 'dns', 'ports', 'geo', 'ssl', 'llm'];

// Simulate progress log animation while the single /scan request runs.
// Since the backend is synchronous, we can't get real-time updates —
// instead we advance each step on a timer to give visual feedback.
function animateLog() {
  let step = 0;
  document.getElementById('log').style.display = 'block';

  // Mark first step as active immediately
  document.getElementById(`log-${logSteps[0]}`).className = 'log-line active';

  // Advance one step every ~3.5 seconds — tuned to roughly match scan duration
  const interval = setInterval(() => {
    if (step < logSteps.length - 1) {
      document.getElementById(`log-${logSteps[step]}`).className = 'log-line done';
      step++;
      document.getElementById(`log-${logSteps[step]}`).className = 'log-line active';
    }
  }, 3500);

  return interval;
}

function markAllDone(interval) {
  clearInterval(interval);
  logSteps.forEach(s => {
    document.getElementById(`log-${s}`).className = 'log-line done';
  });
}

// Build a collapsible section with a label and content element
function makeSection(label, contentEl) {
  const section = document.createElement('div');
  section.className = 'section';

  const header = document.createElement('div');
  header.className = 'section-header';
  header.innerHTML = `<span class="section-label">${label}</span><span class="section-toggle" id="toggle-${label}">[ + ]</span>`;

  const body = document.createElement('div');
  body.className = 'section-body';
  body.appendChild(contentEl);

  // Toggle open/close on header click
  header.addEventListener('click', () => {
    const isOpen = body.classList.toggle('open');
    document.getElementById(`toggle-${label}`).textContent = isOpen ? '[ − ]' : '[ + ]';
  });

  section.appendChild(header);
  section.appendChild(body);
  return section;
}

async function runScan() {
  const target = document.getElementById('targetInput').value.trim();
  if (!target) return;

  const btn = document.getElementById('scanBtn');
  const resultsEl = document.getElementById('results');

  // Reset UI state
  btn.disabled = true;
  btn.textContent = 'SCANNING...';
  resultsEl.style.display = 'none';
  resultsEl.innerHTML = '';
  logSteps.forEach(s => document.getElementById(`log-${s}`).className = 'log-line');

  const logInterval = animateLog();

  try {
    const response = await fetch('/scan', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      // timeout handled by the server — no explicit timeout needed here
      body: JSON.stringify({ target })
    });

    if (!response.ok) throw new Error(`Server error: ${response.status}`);

    const data = await response.json();
    markAllDone(logInterval);
    renderResults(data);

  } catch (err) {
    markAllDone(logInterval);
    resultsEl.innerHTML = `<div class="error-box">ERROR: ${err.message}</div>`;
    resultsEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'SCAN ▶';
  }
}

function renderResults(data) {
  const resultsEl = document.getElementById('results');
  resultsEl.innerHTML = '';

  const analysis  = data.analysis || {};
  const riskLevel = (analysis.risk_level || 'UNKNOWN').toUpperCase();
  const riskScore = analysis.risk_score || 0;
  const riskColor = riskColors[riskLevel] || 'var(--accent)';

  // ── Risk banner ────────────────────────────────────────────────────────────
  const banner = document.createElement('div');
  banner.className = 'risk-banner';
  banner.style.setProperty('--risk-color', riskColor);
  banner.innerHTML = `
    <div class="risk-left">
      <div class="risk-domain">${data.domain}</div>
      <div class="risk-summary">${analysis.summary || ''}</div>
    </div>
    <div class="risk-right">
      <div class="risk-badge">${riskLevel}</div>
      <div class="risk-score">${riskScore}<span> /100</span></div>
    </div>`;
  resultsEl.appendChild(banner);

  // ── Animated score bar ─────────────────────────────────────────────────────
  const barWrap = document.createElement('div');
  barWrap.className = 'score-bar-wrap';
  const barFill = document.createElement('div');
  barFill.className = 'score-bar-fill';
  barFill.style.setProperty('--risk-color', riskColor);
  barWrap.appendChild(barFill);
  resultsEl.appendChild(barWrap);

  // Delay so the transition plays after the element is in the DOM
  setTimeout(() => { barFill.style.width = `${riskScore}%`; }, 100);

  // ── Findings ───────────────────────────────────────────────────────────────
  const findings = analysis.findings || [];
  if (findings.length) {
    const findingsWrap = document.createElement('div');
    findings.forEach(f => {
      const sev = (f.severity || 'INFO').toUpperCase();
      const row = document.createElement('div');
      row.className = 'finding';
      row.innerHTML = `
        <div class="sev-badge sev-${sev}">${sev}</div>
        <div class="finding-cat">${f.category || ''}</div>
        <div class="finding-detail">${f.detail || ''}</div>`;
      findingsWrap.appendChild(row);
    });
    resultsEl.appendChild(makeSection('FINDINGS', findingsWrap));
  }

  // ── Recommendations ────────────────────────────────────────────────────────
  const recs = analysis.recommendations || [];
  if (recs.length) {
    const recsWrap = document.createElement('div');
    recs.forEach(r => {
      const rec = document.createElement('div');
      rec.className = 'rec';
      rec.textContent = r;
      recsWrap.appendChild(rec);
    });
    resultsEl.appendChild(makeSection('RECOMMENDATIONS', recsWrap));
  }

  // ── Raw data sections ──────────────────────────────────────────────────────
  // Each module's raw output in a collapsible section for debugging/demo
  ['whois', 'dns', 'ports', 'geo', 'ssl'].forEach(key => {
    if (!data[key]) return;
    const pre = document.createElement('pre');
    pre.textContent = JSON.stringify(data[key], null, 2);
    resultsEl.appendChild(makeSection(`RAW // ${key.toUpperCase()}`, pre));
  });

  resultsEl.style.display = 'block';
}

// Allow pressing Enter to trigger scan
document.getElementById('targetInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') runScan();
});
</script>
</body>
</html>
